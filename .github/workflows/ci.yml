name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cli:
    name: CLI (TypeScript)
    runs-on: ubuntu-latest
    env:
      # node-tree-sitter 0.25 has no prebuilt binary and is compiled from source;
      # node 24's V8 headers require C++20, so force the standard for node-gyp.
      CXXFLAGS: "-std=c++20"
      CXX: "g++ -std=c++20"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            ix-cli/package-lock.json
            core-ingestion/package-lock.json
      - name: Install core-ingestion deps
        working-directory: core-ingestion
        run: npm ci --silent
      - name: Install & Build
        working-directory: ix-cli
        run: |
          npm ci --silent
          npm run build
      - name: Test
        working-directory: ix-cli
        run: npm test
