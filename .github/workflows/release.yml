name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggered by pushing a version tag:    git tag v0.3.0 && git push origin v0.3.0
#
# What it does (in order):
#   1. Builds System Compass once (platform-independent static bundle)
#   2. Builds + packages a CLI tarball PER PLATFORM on a NATIVE runner, so each
#      tarball's node_modules contains binaries compiled for that platform/arch
#   3. Creates a GitHub Release with all assets + install instructions
#   4. Updates the Homebrew formula with the new SHA and opens a PR
#
# Why native per-platform builds:
#   node-tree-sitter 0.25 ships NO prebuilds and is compiled from source at
#   `npm ci`. Packaging all platforms from one amd64 runner would copy a single
#   linux-x64 core binary into every tarball, breaking the CLI on macOS, Windows
#   and linux-arm64. Each platform must build its own native binding.
#
# Note: The Scala backend (memory-layer) is built and released separately
# from the private ix-memory-layer repo. Docker images are pushed to
# ghcr.io/ix-infrastructure/ix-memory-layer from that repo.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"
  # Packaging dry-run: on PRs that touch the packaging surface, run the full
  # per-platform build + package matrix (no publish) so a broken release leg is
  # caught before tagging instead of mid-release.
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - "scripts/install/**"
      - "ix-cli/package.json"
      - "ix-cli/package-lock.json"
      - "core-ingestion/package.json"
      - "core-ingestion/package-lock.json"
      - "docker-compose.standalone.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.4.9)"
        required: true
      dry_run:
        description: "Build + package on all platforms only; skip publishing the release and the Homebrew PR"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 1. Build System Compass once (platform-independent) ───────────────────
  # Skipped on PR dry-runs (compass needs a private-repo token; the package step
  # treats a missing compass bundle as best-effort anyway).
  compass:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.14"

      - name: Build System Compass
        continue-on-error: true
        env:
          COMPASS_TOKEN: ${{ secrets.COMPASS_TOKEN }}
        run: |
          mkdir -p compass-dist
          if [ -z "$COMPASS_TOKEN" ]; then
            echo "COMPASS_TOKEN not set — skipping compass build (tarballs ship without compass)"
            exit 0
          fi
          git clone https://x-access-token:${COMPASS_TOKEN}@github.com/ix-infrastructure/system-compass.git
          cd system-compass
          npm ci --legacy-peer-deps
          npm run build
          if [ ! -f dist/index.html ]; then
            echo "::error::Compass build did not produce dist/index.html"
            exit 1
          fi
          cp -r dist/* "$GITHUB_WORKSPACE/compass-dist/"

      - name: Upload compass bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: compass-dist
          path: compass-dist
          include-hidden-files: true
          retention-days: 1

  # ── 2. Build + package one tarball per platform on a native runner ────────
  build:
    name: Package (${{ matrix.target }})
    needs: compass
    # Run on tag releases (compass succeeded) and on PR dry-runs (compass skipped).
    if: ${{ always() && needs.compass.result != 'failure' && needs.compass.result != 'cancelled' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Intel macOS (darwin-amd64 / macos-13) is intentionally omitted: those
        # runners are being retired and queue indefinitely, which would stall the
        # release job (it waits on every build leg). Apple-Silicon macOS covers
        # current Macs. Re-add a `darwin-amd64` entry if/when macos-13 is reliable.
        include:
          - target: linux-amd64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-arm64
            runner: macos-14
          - target: windows-amd64
            runner: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Dry-run: no real tag. Use a valid placeholder semver for `npm version`.
            echo "version=0.0.0-pr" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.inputs.tag || github.ref_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.14"
          cache: "npm"
          cache-dependency-path: ix-cli/package-lock.json

      # node-tree-sitter 0.25's binding.gyp self-specifies C++17 on every
      # platform; node 22's V8 headers compile that cleanly with no override.
      # (The C++20 flag in ci.yml exists only because CI runs node 24.)
      - name: Build core-ingestion (native compile)
        working-directory: core-ingestion
        run: npm ci --silent

      - name: Build CLI
        working-directory: ix-cli
        run: |
          npm ci --silent
          npm run build
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      # Compass is best-effort (only built when COMPASS_TOKEN is set); never let a
      # missing/empty compass artifact block a platform build.
      - name: Download compass bundle
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: compass-dist
          path: compass-dist

      - name: Package CLI (${{ matrix.target }})
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="ix-${VERSION}-${{ matrix.target }}"
          # Compute the checksum with node (always present on every runner);
          # `shasum` is missing from the bash shell on GitHub's Windows image.
          sha256file() {
            node -e "const c=require('crypto'),f=require('fs'),p=process.argv[1];process.stdout.write(c.createHash('sha256').update(f.readFileSync(p)).digest('hex')+'  '+p+'\n')" "$1"
          }
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -rL ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -rL core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          if [ -f compass-dist/index.html ]; then
            cp -r compass-dist/* "$STAGING/compass/"
          fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            cat > "$STAGING/ix.cmd" <<'WRAPPER'
          @echo off
          node "%~dp0cli\dist\cli\main.js" %*
          WRAPPER
            7z a -tzip "$STAGING.zip" "$STAGING" >/dev/null
            sha256file "$STAGING.zip" > "$STAGING.zip.sha256"
          else
            cat > "$STAGING/ix" <<'WRAPPER'
          #!/bin/sh
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec node "$SCRIPT_DIR/cli/dist/cli/main.js" "$@"
          WRAPPER
            chmod +x "$STAGING/ix"
            tar -czf "$STAGING.tar.gz" "$STAGING"
            sha256file "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"
          fi

      - name: Generate SBOM (${{ matrix.target }})
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ix-cli
          format: spdx-json
          output-file: ix-${{ steps.version.outputs.version }}-${{ matrix.target }}.sbom.spdx.json
          artifact-name: sbom-${{ matrix.target }}.spdx.json

      - name: Upload tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ix-${{ matrix.target }}
          path: |
            ix-*-${{ matrix.target }}.tar.gz
            ix-*-${{ matrix.target }}.tar.gz.sha256
            ix-*-${{ matrix.target }}.zip
            ix-*-${{ matrix.target }}.zip.sha256
            ix-*-${{ matrix.target }}.sbom.spdx.json
          if-no-files-found: error
          retention-days: 1

  # ── 3 + 4. Collect artifacts, create the Release, update Homebrew ─────────
  # Skipped entirely on a dry run: the build matrix above still validates every
  # platform's native compile + packaging, but nothing is published.
  release:
    needs: build
    if: ${{ !inputs.dry_run && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + push the brew branch
      pull-requests: write # open the brew formula PR
      id-token: write # keyless signing for provenance attestation
      attestations: write # record the build provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Dry-run: no real tag. Use a valid placeholder semver for `npm version`.
            echo "version=0.0.0-pr" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.inputs.tag || github.ref_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all platform tarballs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: _artifacts
          pattern: ix-*
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "_artifacts/*.tar.gz,_artifacts/*.zip"

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Install

            ### Quick install (no repo needed)
            ```bash
            # macOS / Linux
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install/install.sh | bash

            # Windows (PowerShell)
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install/install.ps1 | iex

            # Homebrew
            brew tap ${{ github.repository_owner }}/ix https://github.com/${{ github.repository }}
            brew install ix
            ix docker start
            ```

            ### Docker image
            ```bash
            docker pull ghcr.io/ix-infrastructure/ix-memory-layer:latest
            ```
          files: |
            _artifacts/*.tar.gz
            _artifacts/*.tar.gz.sha256
            _artifacts/*.zip
            _artifacts/*.zip.sha256
            _artifacts/*.sbom.spdx.json

      - name: Update Homebrew formula
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)

          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/ix.rb
          sed -i "s|# sha256 .*|sha256 \"${SHA256}\"|; s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/ix.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/brew-update-v${VERSION}"
          git checkout -b "$BRANCH"
          git add Formula/ix.rb
          git commit -m "brew: update formula for v${VERSION}" || exit 0
          git push --force-with-lease origin "$BRANCH"
          gh pr create --title "brew: update formula for v${VERSION}" --body "Auto-generated: updates Homebrew formula SHA for v${VERSION}" --base main || true
